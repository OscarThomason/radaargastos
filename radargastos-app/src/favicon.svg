<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fondo y borde principal -->
  <circle cx="50" cy="50" r="45" fill="#000000" stroke="#000000" stroke-width="5"/>
  
  <!-- Círculos concéntricos del radar -->
  <circle cx="50" cy="50" r="30" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  <circle cx="50" cy="50" r="15" fill="none" stroke="#ffffff" stroke-width="3" opacity="0.8"/>
  
  <!-- Punto central -->
  <circle cx="50" cy="50" r="6" fill="#ffffff"/>
  
  <!-- Ejes coordenados -->
  <line x1="5" y1="50" x2="95" y2="50" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  <line x1="50" y1="5" x2="50" y2="95" stroke="#ffffff" stroke-width="2" opacity="0.5"/>
  
  <!-- Barrido de escaneo del radar -->
  <path d="M50 50 L50 5 A45 45 0 0 1 81.8 18.2 Z" fill="#ffffff" opacity="0.4"/>
</svg>
