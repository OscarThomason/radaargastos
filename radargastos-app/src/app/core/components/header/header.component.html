<header class="topbar">
  <div>
    <h1>Radar de Pagos</h1>
    <p>Tu control de deudas, servicios y gastos</p>
  </div>
  <div style="display: flex; align-items: center; gap: 20px;">
    <div class="today-chip">{{ todayStr }}</div>
    @if (authService.userSignal()) {
      <div class="user-profile">
        <img [src]="authService.userSignal()?.photoURL" alt="Avatar" class="avatar">
        <div class="user-info">
          <span class="user-name">{{ authService.userSignal()?.displayName }}</span>
          <button class="btn-logout" (click)="syncCalendar()" style="color: var(--text);">📅 Sincronizar Pagos</button>
          <button class="btn-logout" (click)="logout()">Cerrar sesión</button>
        </div>
      </div>
    }
  </div>
</header>
<nav class="tabs">
  <a routerLink="/resumen" routerLinkActive="active">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><line x1="3" y1="9" x2="21" y2="9"></line><line x1="9" y1="21" x2="9" y2="9"></line></svg>
    <span>Resumen</span>
  </a>
  <a routerLink="/deudas" routerLinkActive="active">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="1" y="4" width="22" height="16" rx="2" ry="2"></rect><line x1="1" y1="10" x2="23" y2="10"></line></svg>
    <span>Deudas</span>
  </a>
  <a routerLink="/servicios" routerLinkActive="active">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"></path></svg>
    <span>Servicios</span>
  </a>
  <a routerLink="/gastos" routerLinkActive="active">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"></line><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"></path></svg>
    <span>Gastos</span>
  </a>
  <a routerLink="/estadisticas" routerLinkActive="active">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.21 15.89A10 10 0 1 1 8 2.83"></path><path d="M22 12A10 10 0 0 0 12 2v10z"></path></svg>
    <span>Gráficos</span>
  </a>
</nav>
