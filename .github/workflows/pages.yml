name: Deploy Angular to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: './radargastos-app/package-lock.json'
      
      - name: Install dependencies
        working-directory: ./radargastos-app
        run: npm ci
      
      - name: Build with GitHub Pages base href
        working-directory: ./radargastos-app
        run: npm run build -- --base-href=/radaargastos/
        
      - name: Fix GitHub Pages 404 routing
        working-directory: ./radargastos-app
        run: cp dist/radargastos-app/browser/index.html dist/radargastos-app/browser/404.html
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './radargastos-app/dist/radargastos-app/browser'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
